<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <h1>align items (row)</h1>
  <!-- 아이템 행/열의 위치 -->

  <style>
    .container {
      border: 1px solid;
      display: flex;
      flex-direction: row;
      width: 100px;
      height: 100px;
    }

    .flex-row {
      flex-direction: row;
    }

    .flex-col {
      flex-direction: column;
    }

    .item {
      background-color: #000;
      color: #fff;
      width: 20px;
      height: 20px;
    }

    .items-center {
      align-items: center;
    }

    .justify-between {
      justify-content: space-between;
    }
    </style>

  <h3>1</h3>
  <div class="container flex-row justify-between items-center">
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
  </div>

  <h3>2</h3>
  <div class="container flex-col justify-between items-center">
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
  </div>
  
</body>
</html>
