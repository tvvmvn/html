<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>

  <h1>flex direction</h1>

  <style>
    .container {
      border: 1px solid;
      display: flex;
      gap: 4px;
      width: 100px;
      height: 100px;
    }

    .item {
      background-color: #000;
      width: 20px;
      height: 20px;
    }

    .flex-row {
      flex-direction: row;
    }
    
    .flex-col {
      flex-direction: column;
    }
  </style>

  <h3>flex-direction: row</h3>
  <div class="container flex-row">
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
  </div>

  <h3>flex-direction: column</h3>
  <div class="container flex-col">
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
  </div>

</body>

</html>
