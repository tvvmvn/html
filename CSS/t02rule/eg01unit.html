<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <h1>Unit for length</h1>
  
  <style>

    html {
      /* 
      루트 엘리먼트의 폰트 크기는 
      브라우저의 폰트 설정값에 따라 결정됩니다.
      */
      font-size: 16px;
    }

    ul {
      font-size: 16px;
    }

    .px {
      font-size: 16px;
    }

    .rem {
      /* 루트 엘리먼트 기준 */
      font-size: 1rem;
    }

    .em {
      /* 부모 기준 */
      font-size: 1em;
    }

    .percent {
      /* 부모 기준 */
      font-size: 100%;
    }

    .vw {
      /* 뷰포트의 넓이 기준 */
      font-size: 10vw;
    }

    .vh {
      /* 뷰포트의 높이 기준 */
      font-size: 10vh;
    }
  </style>

  <ul>
    <li class="px">font-size: 16px</li>
    <li class="rem">font-size: 1rem</li>
    <li class="em">font-size: 1em</li>
    <li class="percent">font-size: 100%</li>
    <li class="vw">font-size: 10vw</li>
    <li class="vh">font-size: 10vh</li>
  </ul>
  
</body>
</html>
