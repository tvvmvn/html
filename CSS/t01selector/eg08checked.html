<!DOCTYPE html>
<html lang="en">
<head>

  <title>Document</title>

<body>

  <h1>checked</h1>

  <style>
    input:checked + label {
      text-decoration-line: line-through;
    }
  </style>  

  <h3>할일 목록</h3>
  <input type="checkbox" name="eat" id="eat">
  <label for="eat">밥먹기</label>
  
</body>
