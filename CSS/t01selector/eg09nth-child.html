<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <h1>nth-child</h1>

  <style>
    tr:nth-child(even) {
      background-color: #ddd;
    }
  </style>  

  <table border="1">
    <tbody>
      <tr>
        <th>id</th>
        <th>name</th>
        <th>age</th>
      </tr>
      <tr>
        <td>1</td>
        <td>John Doe</td>
        <td>30</td>
      </tr>
      <tr>
        <td>2</td>
        <td>Jane Doe</td>
        <td>25</td>
      </tr>
      <tr>
        <td>3</td>
        <td>Mary Doe</td>
        <td>40</td>
      </tr>
    </tbody>
  </table>
  
</body>
</html>
