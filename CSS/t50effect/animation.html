<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <h1>Spinner</h1>

  <style>
    /* 
      CSS 애니메이션 속성

      1 animation-name (필수)
      적용할 애니메이션의 이름

      2 animation-duration (필수)
      애니메이션이 한번 진행되는데 걸리는 시간

      3 animation-iteration-count
      애니메이션의 반복 횟수. 기본값은 1
      1) 숫자
      2) infinite (무한)

      4 animation-timing-function
      애니메이션의 속도 조절

      1) ease (기본값)
      2) ease-in
      3) ease-out
      4) linear
    */
    
    #spinner {
      /* size */
      width: 50px;
      height: 50px;
      /* layout */
      margin: 50px auto;
      /* design */
      border: 5px solid #333;
      border-top: 5px solid transparent;
      border-radius: 99px;
    }
    
    .animation-spin {
      animation-name: spin;
      animation-duration: 1.5s;
      animation-iteration-count: infinite;
      animation-timing-function: linear;
    }

    /* animation definition */
    @keyframes spin {
      from {
        transform: ratate(0deg);
      } to {
        transform: rotate(360deg);
      }
    }
  </style>

  <div id="spinner" class="animation-spin"></div> 

</body>
</html>
