<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <h1>box shadow</h1>

  <style>
    /* 
      * box-shadow
      그림자 효과
      기본값: none (그림자 효과 없음)

      - 사용 방법
      box-shadow: offset-x offset-y blur spread color inset

      1 offset-x (필수)
      왼쪽(-) / 오른쪽(+)

      2 offset-y (필수)
      위(-) / 아래(+)

      3 blur (흐림)
      값이 높을수록 그림자가 더 흐려진다

      4 spread (퍼짐)
      그림자의 크기
      증가(+) / 감소(-)
      
      5 color (색상)

      6 inset
      엘리먼트 안으로 그림자 효과를 적용한다
    */
    .item {
      width: 100px;
      height: 100px;
      box-shadow: 0 0 10px 5px #ddd;
    }
  </style>

  <div class="item"></div>
  
</body>
</html>
