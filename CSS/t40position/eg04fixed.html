<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <h1>position: fixed</h1>

  <style>
    .item {
      padding: 0.5rem;
      background-color: #ddd;
    }
    
    .fixed {
      position: fixed;
    }

    .top-4 {
      top: 1rem;
    }

    .bottom-4 {
      bottom: 1rem;
    }

    .left-4 {
      left: 1rem;
    }

    .right-4 {
      right: 1rem;
    }
  </style>

  <div class="item fixed top-4 left-4">item 1</div>
  <div class="item fixed top-4 right-4">item 2</div>
  <div class="item fixed bottom-4 left-4">item 3</div>
  <div class="item fixed bottom-4 right-4">item 4</div>
  
</body>
</html>
