<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <h1>position: absolute</h1>

  <style>
    .container {
      height: 200px;
      border: 1px solid;
    }

    .item {
      background-color: #ddd;
      padding: 0.5rem;
    }
    
    .relative {
      position: relative;
    }

    .absolute {
      position: absolute;
    }

    .top-4 {
      top: 1rem;
    }

    .bottom-4 {
      bottom: 1rem;
    }

    .left-4 {
      left: 1rem;
    }

    .right-4 {
      right: 1rem;
    }
  </style>

  <div class="container relative">
    <div class="item absolute top-4 left-4">item 1</div>
    <div class="item absolute top-4 right-4">item 2</div>
    <div class="item absolute bottom-4 left-4">item 3</div>
    <div class="item absolute bottom-4 right-4">item 4</div>
  </div>
  
</body>
</html>
