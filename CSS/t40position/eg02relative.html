<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <h1>position: relative</h1>

  <style>
    .item {
      background-color: #ddd;
      padding: 0.5rem;
      display: inline-block;
    }
    
    .relative {
      position: relative;
    }

    .top-4 {
      top: 1rem;
    }

    .bottom-4 {
      bottom: 1rem;
    }

    .left-4 {
      left: 1rem;
    }

    .right-4 {
      right: 1rem;
    }
  </style>

  <h3>top: 1rem</h3>
  <div class="item relative top-4">item 1</div>

  <h3>bottom: 1rem</h3>
  <div class="item relative bottom-4">item 2</div>

  <h3>left: 1rem</h3>
  <div class="item relative left-4">item 3</div>

  <h3>right: 1rem</h3>
  <div class="item relative right-4">item 3</div>
  
</body>
</html>
