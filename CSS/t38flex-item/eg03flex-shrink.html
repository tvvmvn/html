<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <h1>flex shrink</h1>

  <style>
    .container {  
      background-color: #ddd;
      display: flex;
      gap: 0.5rem;
    }

    .item {
      background-color: #000;
      color: #fff;
      padding: 0.5rem;
      width: 200px;
    }

    .shrink {
      flex-shrink: 1;
    }
    
    .shrink-0 {
      flex-shrink: 0;
      background-color: #f00;
    }
  </style>

  <h3>flex-shrink: 1</h3>
  <div class="container">
    <div class="item shrink">item 1</div>
    <div class="item shrink">item 2</div>
    <div class="item shrink">item 3</div>
  </div>

  <h3>flex-shrink: 0 (item 2)</h3>
  <div class="container">
    <div class="item shrink">item 1</div>
    <div class="item shrink-0">item 2</div>
    <div class="item shrink">item 3</div>
  </div>
  
</body>
</html>
