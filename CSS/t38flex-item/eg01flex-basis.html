<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <h1>flex basis</h1>

  <style>
    .container {
      display: flex;
      border: 1px solid;
      gap: 0.5rem;
    }

    .flex-row {
      flex-direction: row;
    }

    .flex-col {
      flex-direction: column;
    }

    .item {
      flex-basis: 50px;
      background-color: #000;
      color: #fff;
      padding: 0.5rem;
    }

  </style>

  <h3>in a direction row</h3>
  <div class="container flex-row">
    <div class="item">item 1</div>
    <div class="item">item 2</div>
    <div class="item">item 3</div>
  </div>

  <h3>in a direction column</h3>
  <div class="container flex-col">
    <div class="item">item 1</div>
    <div class="item">item 2</div>
    <div class="item">item 3</div>
  </div>
  
</body>
</html>
