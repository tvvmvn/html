<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <style>
    .item {
      border: 1px solid;
      padding: 0.5rem;
    }

    .bg-red {
      background-color: red;
    }

    .bg-green {
      background-color: green;
    }

    .bg-blue {
      background-color: blue;
    }
  </style>

  <h3>background-color: red</h3>
  <div class="item bg-red">item</div>
  
  <h3>background-color: green</h3>
  <div class="item bg-green">item</div>

  <h3>background-color: blue</h3>
  <div class="item bg-blue">item</div>
  
</body>
</html>
