<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <!-- margin collapse -->
  <!-- margin: 0 auto -->
  
  <h1>margin</h1>

  <style>
    .item {
      background-color: #ddd;
    }

    .mt-4 {
      margin-top: 1rem;
    }

    .mb-4 {
      margin-bottom: 1rem;
    }

    .ml-4 {
      margin-left: 1rem;
    }

    .mr-4 {
      margin-right: 1rem;
    }

    .m-4 {
      margin: 1rem;
    }
  </style>

  <h3>margin: 0</h3>
  <div class="item">item</div>

  <h3>margin-top: 1rem</h3>
  <div class="item mt-4">item</div>

  <h3>margin-bottom: 1rem</h3>
  <div class="item mb-4">item</div>

  <h3>margin-left: 1rem</h3>
  <div class="item ml-4">item</div>

  <h3>margin-right: 1rem</h3>
  <div class="item mr-4">item</div>

  <h3>margin all-side: 1rem</h3>
  <div class="item m-4">item</div>
  
</body>
</html>
