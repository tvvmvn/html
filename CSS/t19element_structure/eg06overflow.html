<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <h1>Contents</h1>
  
  <style>
    .container {
      border: 1px solid;
      width: 100px;
      height: 100px;
    }

    .content {
      background-color: #ddd;
      width: 120px;
      height: 120px;
    }

    .overflow-visible {
      overflow: visible;
    }

    .overflow-hidden {
      overflow: hidden;
    }

    .overflow-auto {
      overflow: auto;
    }
    
    .overflow-scroll {
      overflow: scroll;
    }
  </style>
  
  <h3>hidden</h3>
  <div class="container overflow-hidden">
    <div class="content"></div>
  </div>
  
  <h3>auto</h3>
  <div class="container overflow-auto">
    <div class="content"></div>
  </div>

  <h3>scroll</h3>
  <div class="container overflow-scroll">
    <div class="content"></div>
  </div>

  <h3>visible</h3>
  <div class="container overflow-visible">
    <div class="content"></div>
  </div>
  
</body>
</html>
