<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <h1>border style</h1>

  <style>
    .item {
      border-width: 1px;
      border-color: black;
    }

    .border-solid {
      border-style: solid;
    }

    .border-dashed {
      border-style: dashed;
    }

    .border-dotted {
      border-style: dotted;
    }
    
    .border-none {
      border-style: none;
    }
  </style>

  <h3>border-style: solid</h3>
  <div class="item border-solid">item</div>

  <h3>border-style: dashed</h3>
  <div class="item border-dashed">item</div>

  <h3>borde-style: dotted</h3>
  <div class="item border-dotted">item</div>
  
  <h3>border-style: none</h3>
  <div class="item border-none">item</div>

</body>
</html>
