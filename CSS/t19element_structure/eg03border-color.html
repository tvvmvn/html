<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <h1>Border Color</h1>

  <style>
    .item {
      border-style: solid;
      border-width: 1px;
    }

    .border-red {
      border-color: red;
    }

    .border-green {
      border-color: green;
    }

    .border-blue {
      border-color: blue;
    }
  </style>

  <h3>border-color: red</h3>
  <div class="item border-red">item</div>

  <h3>border-color: green</h3>
  <div class="item border-green">item</div>

  <h3>borde-color: blue</h3>
  <div class="item border-blue">item</div>
  
</body>
</html>
