<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <h1>border width</h1>

  <style>
    .item {
      border-style: solid;
    }

    .border {
      border-width: 1px;
    }

    .border-2 {
      border-width: 2px;
    }

    .border-4 {
      border-width: 4px;
    }
  </style>

  <h3>border-width: 1px</h3>
  <div class="item border">item</div>

  <h3>border-width: 2px</h3>
  <div class="item border-2">item</div>

  <h3>border-width: 4px</h3>
  <div class="item border-4">item</div>
  
</body>
</html>
