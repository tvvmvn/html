<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <h1>padding</h1>

  <style>
    .item {
      background-color: #ddd;
    }

    .pt-4 {
      padding-top: 1rem;
    }

    .pb-4 {
      padding-bottom: 1rem;
    }

    .pl-4 {
      padding-left: 1rem;
    }

    .pr-4 {
      padding-right: 1rem;
    }

    .p-4 {
      padding: 1rem;
    }
  </style>

  <h3>padding: 0</h3>
  <div class="item">item</div>

  <h3>padding-top: 1rem</h3>
  <div class="item pt-4">item</div>

  <h3>padding-bottom: 1rem</h3>
  <div class="item pb-4">item</div>

  <h3>padding-left: 1rem</h3>
  <div class="item pl-4">item</div>

  <h3>padding-right: 1rem</h3>
  <div class="item pr-4">item</div>

  <h3>padding all-side: 1rem</h3>
  <div class="item p-4">item</div>
  
</body>
</html>
