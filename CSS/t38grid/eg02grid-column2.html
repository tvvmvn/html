<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <h1>grid</h1>

  <style>
    .container {
      border: 1px solid;
      display: grid;
      /* 각 아이템이 최소 0, 최대 1/3 크기를 가짐 */
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.5rem;
    }

    .item {
      background-color: #ddd;
      padding: 0.5rem;
    }

    .col-span-2 {
      grid-column: span 2 / span 2;
    }

    .col-span-3 {
      grid-column: span 3 / span 3;
    }
  </style>

  <div class="container">
    <div class="item col-span-2">item 1</div>
    <div class="item col-span-2">item 2</div>
    <div class="item">item 3</div>
    <div class="item col-span-3">item 4</div>
    <div class="item col-span-3">item 5</div>
    <div class="item">item 6</div>
  </div>
  
</body>
</html>
