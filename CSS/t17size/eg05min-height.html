<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <h1>min-height</h1>

  <style>
    .item {
      border: 1px solid;
    }

    .min-h-auto {
      min-height: auto;
    }

    /* 4 = 1rem  */
    .min-h-24 {
      min-height: 6rem;
    }
  </style>

  <h3>min-height: auto</h3>
  <p class="item min-h-auto"></p>

  <h3>min-height: 6rem</h3>
  <p class="item min-h-24"></p>
</body>
</html>
