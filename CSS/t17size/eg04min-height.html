<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <h1>min-height</h1>

  <style>
    .item {
      border: 1px solid;
    }
    /* 4 = 1rem  */
    .min-h-16 {
      min-height: 4rem;
    }
  </style>

  <h3>No Contents</h3>
  <p class="item min-h-16">no contents</p>

  <h3>With Contents</h3>
  <p class="item min-h-16">
    Lorem ipsum dolor sit, amet consectetur adipisicing elit. 
    Quisquam nisi id quaerat perferendis animi vero doloribus tempore inventore eaque eligendi, 
    eius assumenda non corporis, perspiciatis necessitatibus porro pariatur quia deleniti.
  </p>
</body>
</html>
