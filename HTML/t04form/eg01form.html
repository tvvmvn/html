<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <h1>Subscribe us</h1>
  
  <!-- action: 요청 주소 -->
  <!-- method: 요청 메서드 -->
  <form action="/subscribe" method="POST">
    <input 
      type="email" 
      name="email" 
      placeholder="johndoe@example.com"
    >
    <!-- button(submit): 폼 제출 버튼 -->
    <button type="submit">
      subscribe
    </button>
  </form>
  
</body>
</html>
