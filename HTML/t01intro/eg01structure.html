<!-- HTML 문서로 선언합니다. -->
<!DOCTYPE html>

<!-- html: 문서에서 최상위 엘리먼트입니다. head, body를 감쌉니다. -->
<html lang="en">

<!-- head: 메타 데이터 -->
<head>
  <!-- 
    charset: 문자 인코딩 방식(character set)을 지정합니다. 
  -->
  <meta charset="UTF-8">
  <!-- 
    name: 메타 데이터의 이름
    content: 메타 데이터의 내용
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- title: 문서의 제목 -->
  <title>My Homepage</title>
  <!-- head의 끝 -->
</head>

<!-- body: 본문 -->
<body>
  
<!-- body의 끝 -->
</body>

<!-- html의 끝 -->
</html>
